name: Compliance Updates

on:
  workflow_dispatch:

jobs:
  update-compliance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Compliance Engine
        run: node scripts/scrape-updates.js
