name: Compliance Updates

on:
  workflow_dispatch:
  schedule:
        - cron: '0 0 * * *'
jobs:
  update-compliance:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          - name: Install Dependencies
            run: npm install

      - name: Run Compliance Engine
        run: node scripts/scrape-updates.js

      - name: Commit Updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/live-updates.json
          git add data/update-history.json

          git diff --staged --quiet || git commit -m "Automated compliance update"

          git push
